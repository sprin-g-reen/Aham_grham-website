<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6KH32E2GK7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6KH32E2GK7');
    </script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-blue: #3b82f6;
            --accent-purple: #7c4dff;
            --bg-dark: #05051a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: transparent;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .checkout-wrapper {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin: 0;
        }

        .checkout-layout {
            display: flex;
            flex-direction: row;
            gap: 24px;
            align-items: stretch;
            width: 100%;
        }

        .checkout-box {
            flex: 1;
            min-width: 0;
            background: rgba(10, 10, 32, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Left Box specific styling */
        .session-info-box {
            padding: 0;
            overflow: hidden;
        }

        .session-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .session-details {
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .box-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .box-title .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-blue);
            border-radius: 50%;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-blue);
            font-weight: 700;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .book-btn {
            width: 100%;
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(124, 77, 255, 0.3);
            text-transform: lowercase;
            margin-top: auto;
        }

        .book-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(124, 77, 255, 0.4);
            filter: brightness(1.1);
        }

        .session-title {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
            text-transform: lowercase;
        }

        .session-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            text-transform: lowercase;
        }

        @media (max-width: 768px) {
            .checkout-layout {
                flex-direction: column;
            }
            .checkout-wrapper {
                padding: 20px;
                height: 100vh;
                overflow-y: auto;
            }
            .session-image {
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="checkout-wrapper">
        <div class="header-section">
            <h1>book your session</h1>
            <p class="subtitle">enter your details to begin your journey</p>
        </div>
        
        <div class="checkout-layout" style="justify-content: center;">
            <!-- Right Box: Booking Form -->
            <div class="checkout-box" style="max-width: 500px; width: 100%;">
                <div class="box-title"><span class="dot" style="background: var(--accent-purple);"></span> your information</div>
                
                <form id="bookingForm" onsubmit="handleBooking(event)" style="display: flex; flex-direction: column; gap: 20px; height: 100%;">
                    <div class="form-group">
                        <label for="name">full name</label>
                        <input type="text" id="name" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">email address</label>
                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">phone number</label>
                        <input type="tel" id="phone" placeholder="+91 98765 43210" required>
                    </div>

                    <button type="submit" class="book-btn" id="bookBtn">book this session</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Extract params from URL if needed (for tracking or future use)
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title');

        function handleBooking(e) {
            e.preventDefault();
            const btn = document.getElementById('bookBtn');
            btn.innerText = 'redirecting to scheduler...';
            btn.disabled = true;
            
            // Redirect to Calendly after a brief delay
            setTimeout(() => {
                window.parent.location.href = 'https://calendly.com/aham_grham-salem';
            }, 1000);
        }
    </script>
</body>
</html>
