<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Aham Grham</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-blue: #3b82f6;
            --accent-purple: #7c4dff;
            --bg-dark: #05051a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: transparent;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Prevent outer scroll */
        }

        .checkout-wrapper {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            scrollbar-width: none; /* Hide scrollbar Firefox */
            -ms-overflow-style: none; /* Hide scrollbar IE/Edge */
        }

        .checkout-wrapper::-webkit-scrollbar {
            display: none; /* Hide scrollbar Chrome/Safari/Webkit */
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin: 0;
        }

        .checkout-layout {
            display: flex;
            flex-direction: row;
            gap: 24px;
            align-items: stretch;
            width: 100%;
        }

        .checkout-box {
            flex: 1;
            min-width: 0; /* Prevents overflow */
            background: rgba(10, 10, 32, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .box-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .box-title .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-blue);
            border-radius: 50%;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-blue);
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        textarea {
            resize: none;
            flex-grow: 1;
            min-height: 120px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .pay-btn {
            width: 100%;
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(124, 77, 255, 0.3);
            text-transform: lowercase;
            margin-top: auto;
        }

        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(124, 77, 255, 0.4);
            filter: brightness(1.1);
        }

        @media (max-width: 768px) {
            .checkout-layout {
                flex-direction: column;
            }
            .checkout-wrapper {
                padding: 20px;
            }
        }

        .success-message {
            display: none;
            text-align: center;
            max-width: 450px;
            margin: 0 auto;
            background: rgba(10, 10, 32, 0.95);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
    <div class="checkout-wrapper" id="checkoutForm">
        <div class="header-section">
            <h1>secure checkout</h1>
            <p class="subtitle">enter your details to complete the ritual purchase</p>
        </div>
        
        <form id="paymentForm" onsubmit="handlePay(event)" class="checkout-layout">
            <!-- Left Box: Personal Info -->
            <div class="checkout-box">
                <div class="box-title"><span class="dot"></span> personal information</div>
                
                <div class="form-group">
                    <label for="name">full name</label>
                    <input type="text" id="name" placeholder="Alexander Doe" required>
                </div>

                <div class="form-group">
                    <label for="number">phone number</label>
                    <input type="tel" id="number" placeholder="+91 98765 43210" required>
                </div>
                
                <div class="form-group">
                    <label for="email">email address</label>
                    <input type="email" id="email" placeholder="alex@ritual.com" required>
                </div>
                
                <div class="form-group">
                    <label for="pincode">pincode</label>
                    <input type="text" id="pincode" placeholder="110001" required pattern="[0-9]{6}">
                </div>
            </div>

            <!-- Right Box: Shipping & Pay -->
            <div class="checkout-box">
                <div class="box-title"><span class="dot" style="background: var(--accent-purple);"></span> shipping details</div>

                <div class="form-group">
                    <label for="city">city</label>
                    <input type="text" id="city" placeholder="New Delhi" required>
                </div>

                <div class="form-group">
                    <label for="state">state</label>
                    <input type="text" id="state" placeholder="Delhi" required>
                </div>

                <div class="form-group">
                    <label for="address">full address</label>
                    <textarea id="address" placeholder="Apartment, Street, Landmark" required></textarea>
                </div>

                <button type="submit" class="pay-btn" id="payBtn">pay now</button>
            </div>
        </form>
    </div>

    <div class="success-message" id="successView">
        <div class="success-icon">
            <span class="material-symbols-outlined" style="font-size: 48px;">check_circle</span>
        </div>
        <h2>order placed</h2>
        <p class="subtitle">your sanctuary tools are being prepared. check your email for confirmation.</p>
        <button class="pay-btn" style="margin-top: 32px;" onclick="window.parent.postMessage('closeCheckout', '*')">close window</button>
    </div>

    <script>
        // Dynamic API URL detection
        const getApiUrl = () => {
            const isLocal = window.location.hostname === 'localhost' || 
                            window.location.hostname === '127.0.0.1' || 
                            window.location.hostname.startsWith('192.168.') || 
                            window.location.hostname.startsWith('10.');
            
            return isLocal 
                ? `http://${window.location.hostname}:5000/api/customers`
                : 'https://aham-grham-backend.vercel.app/api/customers';
        };

        async function handlePay(e) {
            e.preventDefault();
            const btn = document.getElementById('payBtn');
            const originalText = btn.innerText;
            btn.innerText = 'processing...';
            btn.disabled = true;

            const customerData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('number').value,
                email: document.getElementById('email').value,
                pincode: document.getElementById('pincode').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                address: document.getElementById('address').value
            };
            
            try {
                const apiUrl = getApiUrl();
                console.log('Posting to:', apiUrl);

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(customerData)
                });

                if (response.ok) {
                    // Close the checkout window automatically
                    window.parent.postMessage('closeCheckout', '*');
                } else {

                    const error = await response.json();
                    alert('Error: ' + (error.message || 'Something went wrong'));
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Connection error to ' + getApiUrl() + '. Please ensure backend is running.');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>


</body>
</html>
