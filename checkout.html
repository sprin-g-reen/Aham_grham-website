<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Aham Grham</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-blue: #3b82f6;
            --accent-purple: #7c4dff;
            --bg-dark: #05051a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: transparent;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        .checkout-container {
            background: rgba(10, 10, 32, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 30px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-blue);
            margin-bottom: 8px;
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .pay-btn {
            width: 100%;
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(124, 77, 255, 0.3);
            text-transform: lowercase;
        }

        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(124, 77, 255, 0.4);
            filter: brightness(1.1);
        }

        .success-message {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
    <div class="checkout-container" id="checkoutForm">
        <h1>secure checkout</h1>
        <p class="subtitle">enter your details to complete the ritual purchase</p>
        
        <form id="paymentForm" onsubmit="handlePay(event)">
            <div class="form-group">
                <label for="name">full name</label>
                <input type="text" id="name" placeholder="Alexander Doe" required>
            </div>
            
            <div class="form-group">
                <label for="number">phone number</label>
                <input type="tel" id="number" placeholder="+91 98765 43210" required>
            </div>
            
            <div class="form-group">
                <label for="address">address</label>
                <textarea id="address" rows="3" placeholder="Enter your full address" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="pincode">pincode</label>
                <input type="text" id="pincode" placeholder="110001" required pattern="[0-9]{6}">
            </div>
            
            <button type="submit" class="pay-btn" id="payBtn">pay now</button>
        </form>
    </div>

    <div class="checkout-container success-message" id="successView">
        <div class="success-icon">
            <span class="material-symbols-outlined" style="font-size: 48px;">check_circle</span>
        </div>
        <h2>order placed</h2>
        <p class="subtitle">your sanctuary tools are being prepared. check your email for confirmation.</p>
        <button class="pay-btn" onclick="window.parent.postMessage('closeCheckout', '*')">close window</button>
    </div>

    <script>
        function handlePay(e) {
            e.preventDefault();
            const btn = document.getElementById('payBtn');
            btn.innerText = 'processing...';
            btn.disabled = true;
            
            setTimeout(() => {
                document.getElementById('checkoutForm').style.display = 'none';
                document.getElementById('successView').style.display = 'block';
            }, 2000);
        }
    </script>
</body>
</html>
